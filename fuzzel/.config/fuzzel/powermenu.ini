# Fuzzel powermenu config
# Adapted from main fuzzel.ini with similar styling

[main]
font=Geist:weight=150:size=14
placeholder=Power
prompt=""
layer=overlay
lines=4
width=30
horizontal-pad=32
vertical-pad=20
inner-pad=8
line-height=36

[colors]
background=0e0e0ecc
text=d4d4d4ff
match=b0b0b0ff
selection=d4d4d424
selection-text=f5f5f5ff
selection-match=b0b0b0ff
border=8c8c8c26

[border]
width=4
radius=7

[dmenu]
mode=text
