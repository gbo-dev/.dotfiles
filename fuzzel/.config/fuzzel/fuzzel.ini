# Fuzzel config (drun app launcher)
# Docs: man fuzzel.ini

[main]
font=Geist:size=14
placeholder=Search
prompt=""
terminal=ghostty
layer=overlay
lines=10
width=46
horizontal-pad=48
vertical-pad=24
inner-pad=8
line-height=36
image-size-ratio=0.30

[colors]
background=1b1d1eff
text=ebdbb2ff
match=fe8019ff
selection=282828ff
selection-text=fbf1c7ff
selection-match=fe8019ff
border=2c2f30ff

[border]
width=2
radius=10

[dmenu]
# Enables `fuzzel -d`
mode=text
