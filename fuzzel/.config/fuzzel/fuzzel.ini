# Fuzzel config (drun app launcher)
# Docs: man fuzzel.ini

[main]
font=Geist:size=14
placeholder=Search
prompt=""
terminal=ghostty
layer=overlay
lines=10
width=46
horizontal-pad=48
vertical-pad=24
inner-pad=8
line-height=36
image-size-ratio=0.30

[colors]
background=0e0e0ecc
text=d4d4d4ff
match=b0b0b0ff
selection=d4d4d424
selection-text=f5f5f5ff
selection-match=b0b0b0ff
border=8c8c8c26

[border]
width=4
radius=7

[dmenu]
# Enables `fuzzel -d`
mode=text
