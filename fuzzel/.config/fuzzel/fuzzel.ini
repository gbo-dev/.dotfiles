# Fuzzel config (drun app launcher)
# Docs: man fuzzel.ini

[main]
font=Geist:size=14
placeholder=Search
prompt=""
terminal=ghostty
layer=overlay
lines=10
width=46
horizontal-pad=48
vertical-pad=24
inner-pad=8
line-height=36
image-size-ratio=0.30

[colors]
background=141a24fa
text=e0e6edff
match=7eb8e6ff
selection=8cb4e626
selection-text=ffffffff
selection-match=7eb8e6ff
border=8caad233

[border]
width=2
radius=6

[dmenu]
# Enables `fuzzel -d`
mode=text
