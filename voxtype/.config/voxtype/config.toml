state_file = "auto"

[hotkey]
enabled = false

[whisper]
model = "large-v3-turbo"
language = "auto"  # Auto-detect and transcribe in that language (alt. 'en' for English)
on_demand_loading = true  # Load model only when recording (saves memory)

[output]
mode = "type"
fallback_to_clipboard = true

[audio]
device = "default"  # Or specific device from `pactl list sources short`
sample_rate = 16000
max_duration_secs = 60

[output.notification]
on_recording_start = true # Notify when PTT activates
on_recording_stop = false # Notify when transcribing
on_transcription = true   # Show transcribed text
