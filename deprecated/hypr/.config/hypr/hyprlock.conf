
general {
  hide_cursor = false
  ignore_empty_input = true
}

# Background with the nature wallpaper (no blur)
background {
  monitor =
  path = ~/.config/hypr/wallpapers/the-cleveland-museum-of-art-6PVvj48pPOc-unsplash.jpg
  blur_passes = 2
  blur_distance = 7
  noise = 0.0117
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.15
  vibrancy_darkness = 0.20
}

# Date label - Top left corner
# Format: "Sunday, February 15"
label {
  monitor =
  text = cmd[update:60000] date "+%A, %B %-d"
  font_size = 18
  font_family = Google Sans Flex
  color = rgba(e8e8e8ff)
  position = 40, -40
  halign = left
  valign = top
  shadow_passes = 1
  shadow_size = 2
  shadow_color = rgba(00000055)
}

# Column positions: col1=-65, col2=65 (symmetric around center)
# Row positions: hours=80, minutes=-80

# Hours - First digit (column 1)
label {
  monitor =
  text = cmd[update:1000] date +%H | cut -c1
  font_size = 140
  font_family = Inter Bold
  color = rgba(f5c6a0ff)
  position = -65, 100
  halign = center
  valign = center
  shadow_passes = 0
}

# Hours - Second digit (column 2)
label {
  monitor =
  text = cmd[update:1000] date +%H | cut -c2
  font_size = 140
  font_family = Inter Bold
  color = rgba(f5c6a0ff)
  position = 65, 100
  halign = center
  valign = center
  shadow_passes = 0
}

# Minutes - First digit (column 1)
label {
  monitor =
  text = cmd[update:1000] date +%M | cut -c1
  font_size = 140
  font_family = Inter Bold
  color = rgba(a0d4e8ff)
  position = -65, -100
  halign = center
  valign = center
  shadow_passes = 0
}

# Minutes - Second digit (column 2)
label {
  monitor =
  text = cmd[update:1000] date +%M | cut -c2
  font_size = 140
  font_family = Inter Bold
  color = rgba(a0d4e8ff)
  position = 65, -100
  halign = center
  valign = center
  shadow_passes = 0
}

# Input field - Material You style with large rounded corners
input-field {
  monitor =
  size = 300, 56
  outline_thickness = 0
  
  position = 0, -320
  halign = center
  valign = center
  
  outer_color = rgba(20202000)
  inner_color = rgba(30303080)
  font_color = rgba(ffffffff)
  fade_on_empty = true
  fade_timeout = 2000
  dots_center = true
  dots_size = 0.28
  dots_spacing = 0.40
  
  placeholder_text = 

  fail_text = 
  fail_color = rgba(ff6b6bff)
}
