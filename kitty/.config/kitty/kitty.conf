# BEGIN_KITTY_THEME
include gruvbox_dark.conf
# END_KITTY_THEME
#
editor $EDITOR

# font_family      Iosevka
# bold_font        Iosevka Bold
# italic_font      Iosevka Italic
# bold_italic_font Iosevka Bold Italic

font_family      Iosevka Light
bold_font        Iosevka
italic_font      Iosevka Light Italic
bold_italic_font Iosevka Italic
text_composition_strategy platform

font_size 17.0

disable_ligatures always

window_padding_width 0
window_padding_height 0

background_opacity 0.9
dynamic_background_opacity yes

hide_window_decorations yes

# Cursor
cursor_shape beam
cursor_beam_thickness 1.5

# Mouse
mouse_hide_wait 3.0

# Macos specific
macos_option_as_alt left

#macos_thicken_font 0.25
#macos_thicken_font 0.15

map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+backspace change_font_size all 0
map f11 toggle_fullscreen
